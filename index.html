<!DOCTYPE html>
<html>
    <head>
        <title>패턴3</title>
        <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1">
        <style>
            @font-face {
                font-family: 'NostalgicPoliceVibe';
                src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/Griun_PolSensibility-Rg.woff2') format('woff2');
                font-weight: normal;
                font-display: swap;}
            *{
                margin: 0;
                padding: 0;
            }
            body{
                width: 960px;
                margin: 0 auto;
                overflow: hidden;
                background-color: #0a0a0a;
                color: #e0d8d8;
            }
            #menu{
                width: 260px;
                float: left;
            }
            #section{
                width: 700px;
                float: right;
                text-align: center;
                padding-top: 80px;

            }
            li{list-style: none;}
            #section h1{
                font-size: 2.5rem;
                font-weight: normal;
                letter-spacing: 5px;
                margin-bottom: 15px;
                color: red;
            }
            #section h3{
                font-size: 1rem;
                font-weight: normal;
                color: #888888;
                margin-bottom: 50px;
            }
            #section p{
                font-family:'NostalgicPoliceVibe', serif;
                font-size: 1rem;
                line-height: 2.2;
                letter-spacing: 1px;
                opacity: 0.85;
            }
            @media screen and (max-width: 767px){
                body{width: auto}
                #menu {width:auto; float: none;}
                #section{width: auto; float: none;}
            }
        </style>
    </head>
        <body>
            <div id="section">
                <h1>발열</h1>
                <h3>정지용</h3>
                <p>처마 끝에 서린 연기 따러</p>
                <p>포도 순이 기어 나가는 밤, 소리 없이,</p>
                <p>가믈음 땅에 스며든 더운 김이</p>
                <p>등에 서리나니, 훈훈히,</p>
                <p>아아, 이 애 몸이 또 달아 오르노나.</p>
                <p>가쁜 숨결을 드내 쉬노니, 박나비처럼</p>
                <p>가녀린 머리, 주사 찍은 자리에, 입술 붙이고</p>
                <p>나는 중얼거리다, 나는 중얼거리다.</p>
                <p>부끄러운 줄도 모르는 다신교도와 같이.</p>
                <p>아아, 이 애가 애자지게 보채노나!</p>
                <p>불도 약도 달도 없는 밤</p>
                <p>아늑한 하늘에는</p>
                <p>별들이 참벌 날으듯 하여라.</p>
            </div>
        </body>
</html>
